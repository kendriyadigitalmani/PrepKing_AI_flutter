name: quizking_ai
description: Prepking AI Flutter Quiz App - Production Level
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # Networking
  http: ^1.2.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Authentication
  google_sign_in: ^6.2.1
  firebase_auth: ^4.17.4
  firebase_core: ^2.25.4
  
  # UI & Animations
  confetti: ^0.7.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  
  # Media & Sound
  audioplayers: ^5.2.1
  cached_network_image: ^3.3.0
  
  # Utilities
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  package_info_plus: ^4.2.0
  device_info_plus: ^9.1.1
  
  # Navigation
  go_router: ^12.1.3
  
  # Haptic Feedback
  vibration: ^1.8.4
  
  # JSON Annotation
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/sounds/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
